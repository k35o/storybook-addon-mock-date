name: Install
description: Sets up mise and runs install

runs:
  using: composite
  steps:
    - name: Setup mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      with:
        cache: true

    - name: Install dependencies
      shell: bash
      run: pnpm ci

    - name: Build
      shell: bash
      run: pnpm build
