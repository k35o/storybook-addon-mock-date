name: Install
description: Sets up mise and runs install

runs:
  using: composite
  steps:
    - name: Setup mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        cache: true

    - name: Install dependencies
      shell: bash
      run: pnpm ci

    - name: Build
      shell: bash
      run: pnpm build
