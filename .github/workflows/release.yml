name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

# Git and API writes go through the App token; GITHUB_TOKEN only needs the
# id-token for npm OIDC trusted publishing.
permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.K35O_BOT_CLIENT_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Release
        uses: k35o/pnpm-release-action@9c884985ac053e708a8ef66738cd93d288efb096 # v0.1.0
        with:
          build: pnpm build
          github-token: ${{ steps.app-token.outputs.token }}
          setup-git-user: app
          app-slug: ${{ steps.app-token.outputs.app-slug }}
