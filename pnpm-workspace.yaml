minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@k8o/*'

blockExoticSubdeps: true
verifyDepsBeforeRun: install
savePrefix: ''

allowBuilds:
  esbuild: false

# Moved from package.json "overrides" (storybook: $storybook): pnpm 11 does not
# read overrides from package.json, and the "$" reference syntax is deprecated,
# so the "next" tag is written out to match the storybook devDependency.
overrides:
  storybook: next

versioning:
  changelog:
    storage: repository
